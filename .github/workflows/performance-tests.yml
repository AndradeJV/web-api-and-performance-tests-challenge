name: JMeter Performance Tests

on:
  push:
    branches:
      - performance-tests
  pull_request:
    branches:
      - performance-tests

jobs:
  load-test:
    name: Teste de Carga
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Instalar JMeter
        run: |
          wget -q https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz
          tar -xzf apache-jmeter-5.6.3.tgz
          echo "$PWD/apache-jmeter-5.6.3/bin" >> $GITHUB_PATH

      - name: Executar Teste de Carga
        run: |
          mkdir -p results/load
          jmeter -n \
            -t scripts/load_test.jmx \
            -l results/load/load_results.jtl \
            -e -o results/load/report

      - name: Exibir Resumo do Teste de Carga
        if: always()
        run: |
          echo "=========================================="
          echo "  RESUMO - TESTE DE CARGA"
          echo "=========================================="
          if [ -f results/load/report/statistics.json ]; then
            cat results/load/report/statistics.json | python3 -m json.tool
          else
            echo "Relatório não gerado"
          fi

      - name: Upload Relatório de Carga
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: load-test-report
          path: results/load/report/
          retention-days: 30

  spike-test:
    name: Teste de Pico (Spike)
    runs-on: ubuntu-latest
    needs: load-test

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Instalar JMeter
        run: |
          wget -q https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz
          tar -xzf apache-jmeter-5.6.3.tgz
          echo "$PWD/apache-jmeter-5.6.3/bin" >> $GITHUB_PATH

      - name: Executar Teste de Pico
        run: |
          mkdir -p results/spike
          jmeter -n \
            -t scripts/spike_test.jmx \
            -l results/spike/spike_results.jtl \
            -e -o results/spike/report

      - name: Exibir Resumo do Teste de Pico
        if: always()
        run: |
          echo "=========================================="
          echo "  RESUMO - TESTE DE PICO (SPIKE)"
          echo "=========================================="
          if [ -f results/spike/report/statistics.json ]; then
            cat results/spike/report/statistics.json | python3 -m json.tool
          else
            echo "Relatório não gerado"
          fi

      - name: Upload Relatório de Pico
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: spike-test-report
          path: results/spike/report/
          retention-days: 30
